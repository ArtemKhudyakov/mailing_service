{% extends 'mailing/base.html' %}

{% block title %}MailService - Управление рассылками{% endblock %}

{% block content %}
    <div class="container text-center mt-5">
        <h1 class="display-4">Добро пожаловать в MailService</h1>
        <p class="lead">Профессиональный сервис email-рассылок</p>

        <div class="mt-5">
            {% if user.is_authenticated %}
                <a href="{% url 'mailing:home' %}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-door"></i> На главную
                </a>
            {% else %}
                <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg me-3">
                    <i class="bi bi-box-arrow-in-right"></i> Войти
                </a>
                <a href="{% url 'users:register' %}" class="btn btn-success btn-lg">
                    <i class="bi bi-person-plus"></i> Регистрация
                </a>
            {% endif %}
        </div>
    </div>
{% endblock %}
