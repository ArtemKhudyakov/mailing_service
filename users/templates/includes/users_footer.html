<div class="row">
    <div class="col-12 col-md text-center">
        <h5>Личный кабинет</h5>
        <small class="d-block mb-3 text-muted">&copy; {% now "Y" %}</small>
    </div>
    <div class="col-6 col-md">
        <h5>Аккаунт</h5>
        <ul class="list-unstyled text-small">
            <li><a class="text-muted" href="{% url 'users:login' %}"><i class="bi bi-box-arrow-in-right"></i> Вход</a></li>
            <li><a class="text-muted" href="{% url 'users:register' %}"><i class="bi bi-person-plus"></i> Регистрация</a></li>
            {% if user.is_authenticated %}
                <li><a class="text-muted" href="{% url 'users:profile_edit' %}"><i class="bi bi-pencil-square"></i> Профиль</a></li>
            {% endif %}
        </ul>
    </div>
    <div class="col-6 col-md">
        <h5>Связь</h5>
        <ul class="list-unstyled text-small">
            <li><a class="text-muted" href="#"><i class="bi bi-envelope"></i> Контакты</a></li>
            <li><a class="text-muted" href="#"><i class="bi bi-question-circle"></i> Поддержка</a></li>
        </ul>
    </div>
    <div class="col-6 col-md">
        <h5>Переходы</h5>
        <ul class="list-unstyled text-small">
            <li><a class="text-muted" href="#"><i class="bi bi-journal-text"></i> Блог</a></li>
            <li><a class="text-muted" href="#"><i class="bi bi-list-ul"></i> Каталог</a></li>
        </ul>
    </div>
</div>
